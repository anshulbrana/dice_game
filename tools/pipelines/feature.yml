pipeline:
  name: feature
  identifier: feature
  projectIdentifier: flutter_app
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: account.FlutterApplication
        repoName: dice_game
        build:
          type: branch
          spec:
            branch: <+input>
  stages:
    - stage:
        name: Build iOS IPA
        identifier: Build_iOS_IPA
        type: CI
        spec:
          cloneCodebase: true
          platform:
            os: MacOS
            arch: Arm64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  name: Build iOS IPA
                  identifier: Build_iOS_IPA_Step
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      export PATH="$HOME/flutter/bin:$PATH"
                      flutter clean
                      flutter build ipa --export-method app-store
              - step:
                  name: Collect IPA artifact
                  identifier: Collect_IPA_Artifact
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      ls -al build/ios/ipa
                      echo "IPA output directory contents listed above."
