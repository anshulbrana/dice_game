pipeline:
  name: feature
  identifier: feature
  projectIdentifier: flutter_app
  orgIdentifier: default
  tags: {}
  variables:
    - name: buildIOS
      description: Build iOS IPA
      type: String
      value: "false"
      default: "false"
      required: true
      spec:
        type: String
    - name: buildGoogle
      description: Build Android AAB for Google Play
      type: String
      value: "true"
      default: "true"
      required: true
      spec:
        type: String
  properties:
    ci:
      codebase:
        connectorRef: account.FlutterApplication
        repoName: dice_game
        build:
          type: branch
          spec:
            branch: <+input>.default(main)
  stages:
    - stage:
        name: Build iOS IPA
        identifier: Build_iOS_IPA
        type: CI
        when:
          pipelineStatus: All
          condition: <+pipeline.variables.buildIOS> == "true"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          cloneCodebase: true
          platform:
            os: MacOS
            arch: Arm64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  name: Build iOS IPA
                  identifier: Build_iOS_IPA_Step
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      export PATH="$HOME/flutter/bin:$PATH"
                      flutter clean
                      flutter build ipa --export-method app-store
              - step:
                  name: Collect IPA artifact
                  identifier: Collect_IPA_Artifact
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      ls -al build/ios/ipa
                      echo "IPA output directory contents listed above."
    - stage:
        name: Build Android AAB
        identifier: Build_Android_AAB
        type: CI
        when:
          pipelineStatus: All
          condition: <+pipeline.variables.buildGoogle> == "true"
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: Abort
        spec:
          cloneCodebase: true
          platform:
            os: MacOS
            arch: Arm64
          runtime:
            type: Docker
            spec: {}
          execution:
            steps:
              - step:
                  name: Build Android AAB
                  identifier: Build_Android_AAB_Step
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      export PATH="$HOME/flutter/bin:$PATH"
                      flutter clean
                      flutter build appbundle --release
              - step:
                  name: Collect AAB artifact
                  identifier: Collect_AAB_Artifact
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      ls -al build/app/outputs/bundle/release
                      echo "AAB output directory contents listed above."
