pipeline:
  name: feature
  identifier: feature
  projectIdentifier: flutter_app
  orgIdentifier: default
  tags: {}
  stages:
    - stage:
        name: Build iOS IPA
        identifier: Build_iOS_IPA
        type: Custom
        spec:
          execution:
            steps:
              - step:
                  name: Build iOS IPA
                  identifier: Build_iOS_IPA_Step
                  type: ShellScript
                  spec:
                    shell: Bash
                    onDelegate: true
                    source:
                      type: Inline
                      spec:
                        script: |
                          set -e
                          cd <+pipeline.variables.workspace>
                          export PATH="$HOME/flutter/bin:$PATH"
                          git clone <+codebase.repoUrl> app
                          cd app
                          git checkout <+codebase.branch>
                          cd src
                          flutter clean
                          flutter build ipa --export-method app-store
                          ls -al build/ios/ipa
                  timeout: 60m
        delegateSelectors:
          - self-hosted-agent
