pipeline:
  name: feature
  identifier: feature
  projectIdentifier: flutter_app
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: FlutterApplication
        repoName: GlobalAppV2
        build: <+input>
  stages:
    - stage:
        name: Build iOS IPA
        identifier: Build_iOS_IPA
        type: CI
        spec:
          infrastructure:
            type: VM
            spec:
              type: Pool
              spec:
                poolName: macos-pool
                os: MacOS
          execution:
            steps:
              - step:
                  name: Checkout
                  identifier: Checkout
                  type: GitClone
                  spec:
                    depth: 1
                    build:
                      type: branch
                      spec:
                        branch: <+codebase.branch>
              - step:
                  name: Build iOS IPA
                  identifier: Build_iOS_IPA_Step
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      export PATH="$HOME/flutter/bin:$PATH"
                      flutter clean
                      flutter build ipa --export-method app-store
              - step:
                  name: Collect IPA artifact
                  identifier: Collect_IPA_Artifact
                  type: Run
                  spec:
                    shell: Bash
                    command: |
                      set -e
                      ls -al build/ios/ipa
                      echo "IPA output directory contents listed above."
